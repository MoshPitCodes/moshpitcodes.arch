general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

label {
    monitor =
    text = "Hi moshpitcodes :)"
    color = rgba(192, 202, 245, 1.0)
    font_size = 33
    font_family = "FiraCode Nerd Font"
    position = 0, 260
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +\"%H:%M\")"
    color = rgba(122, 162, 247, 1.0)
    font_size = 78
    font_family = "FiraCode Nerd Font"
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +\"%A, %B %d\")"
    color = rgba(192, 202, 245, 0.8)
    font_size = 18
    font_family = "FiraCode Nerd Font"
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] hyprctl splash
    color = rgba(125, 207, 255, 0.8)
    font_size = 12
    font_family = "FiraCode Nerd Font"
    position = 0, 30
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.30
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(122, 162, 247, 0.9)
    inner_color = rgba(26, 27, 38, 0.5)
    font_color = rgba(192, 202, 245, 1.0)
    font_family = "FiraCode Nerd Font"
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = "<i>Input Password...</i>"
    hide_input = false
    rounding = -1
    check_color = rgba(158, 206, 106, 0.9)
    fail_color = rgba(247, 118, 142, 0.9)
    fail_text = "<i>$FAIL <b>($ATTEMPTS)</b></i>"
    fail_transition = 300
    capslock_color = rgba(247, 118, 142, 0.5)
    swap_font_color = true
    position = 0, -100
    halign = center
    valign = center
}
