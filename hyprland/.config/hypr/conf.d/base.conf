$mod = SUPER
$terminal = ghostty
$browser = zen-browser
$menu = rofi -show drun || pkill rofi

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 3
    col.active_border = rgba(7AA2F7ff)
    col.inactive_border = rgba(292E42ff)
    layout = dwindle
    resize_on_border = false
}

decoration {
    rounding = 5
    rounding_power = 2
    active_opacity = 0.95
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = 0x33000000
    }
}

animations {
    enabled = true

    bezier = easeOut, 0.25, 1, 0.5, 1
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 5, default
    animation = windows, 1, 4.5, easeOutQuint
    animation = windowsIn, 1, 2.8, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.2, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = border, 1, 3.0, easeOutQuint
    animation = fade, 1, 2.8, quick
    animation = layersIn, 1, 2.4, easeOutQuint, popin 87%
    animation = layersOut, 1, 2.4, easeOutQuint, popin 87%
    animation = fadeLayersIn, 1, 0.2, quick
    animation = fadeLayersOut, 1, 1.8, easeOut
    animation = workspaces, 1, 2, easeOut, slide
}

input {
    kb_layout = de
    follow_mouse = 1
    numlock_by_default = true
    repeat_delay = 300
    accel_profile = flat
    float_switch_override_focus = 0
    mouse_refocus = 0
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

dwindle {
    force_split = 2
    pseudotile = true
    preserve_split = true
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    enable_swallow = true
    focus_on_activate = false
    middle_click_paste = false
    layers_hog_keyboard_focus = true
}

xwayland {
    force_zero_scaling = true
}

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

cursor {
    no_warps = true
}

layerrule = blur 1, match:namespace ^(waybar)$
layerrule = ignore_alpha 1, match:namespace ^(waybar)$
layerrule = blur 1, match:namespace ^(launcher)$
layerrule = ignore_alpha 1, match:namespace ^(launcher)$
layerrule = blur 1, match:namespace ^(rofi)$
layerrule = ignore_alpha 1, match:namespace ^(rofi)$
layerrule = blur 1, match:namespace ^(notifications)$
layerrule = ignore_alpha 0.5, match:namespace ^(notifications)$
layerrule = no_anim 1, match:namespace ^(selection)$
layerrule = no_anim 1, match:namespace ^(hyprpicker)$

windowrule = pin on, match:class ^(rofi)$
windowrule = float on, match:class ^(waypaper)$
windowrule = pin on, match:class ^(waypaper)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(org.gnome.Nautilus)$, match:title ^(Properties)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(com.usebottles.bottles)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Open Folder)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Save File)$
windowrule = float on, match:title ^(File Upload)$
windowrule = float on, match:title ^(Confirm to replace files)$
windowrule = float on, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(file_progress)$
windowrule = float on, match:class ^(confirm)$
windowrule = float on, match:class ^(dialog)$
windowrule = float on, match:class ^(download)$
windowrule = float on, match:class ^(notification)$
windowrule = float on, match:class ^(error)$
windowrule = float on, match:class ^(confirmreset)$
windowrule = float on, match:title ^(branchdialog)$
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$
windowrule = idle_inhibit fullscreen, match:class ^(zen)$
windowrule = idle_inhibit focus, match:class ^(mpv)$
windowrule = opacity 1.0 0.97, match:class ^([fF]irefox)$
windowrule = opacity 1.0 0.97, match:class ^([cC]hrom(e|ium))$
windowrule = opacity 1.0 1.0, match:class ^(zen)$
windowrule = opacity 1.0 1.0, match:class ^(Zen-browser)$
windowrule = opacity 1.0 1.0, match:class ^(zen-alpha)$
windowrule = opacity 1.0 1.0, match:class ^(zen-beta)$
windowrule = opaque on, match:class ^(zen)$
windowrule = opaque on, match:class ^(Zen-browser)$
windowrule = opaque on, match:class ^(zen-alpha)$
windowrule = opaque on, match:class ^(zen-beta)$
windowrule = opacity 1.0 1.0, match:class ^(mpv)$
windowrule = opacity 1.0 1.0, match:class ^(vlc)$
windowrule = opacity 1.0 1.0, match:class ^(imv)$
windowrule = opacity 1.0 1.0, match:title ^(.*imv.*)$
windowrule = opacity 1.0 1.0, match:title ^(.*mpv.*)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = opacity 1.0 1.0, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(Viewnior)$
windowrule = float on, match:class ^(Audacious)$
windowrule = opacity 1.0 1.0, match:class ^(Audacious)$
windowrule = float on, match:class ^(zenity)$
windowrule = size 850 500, match:class ^(zenity)$
windowrule = float on, match:class ^(org.gnome.FileRoller)$
windowrule = float on, match:class ^(SoundWireServer)$
windowrule = size 725 330, match:class ^(SoundWireServer)$
windowrule = float on, match:title ^(Volume Control)$
windowrule = size 700 450, match:title ^(Volume Control)$
windowrule = workspace 3, match:class ^(evince)$
windowrule = opacity 1.0 1.0, match:class ^(evince)$
windowrule = workspace 4, match:class ^(Gimp-2.10)$
windowrule = workspace 5, match:class ^(Audacious)$
windowrule = workspace 5, match:class ^(Spotify)$
windowrule = workspace 7, match:class ^(zen-beta)$
windowrule = workspace 8, match:class ^(com.obsproject.Studio)$
windowrule = workspace 1, match:class ^(discord)$
windowrule = workspace 1, match:title ^(btop-monitor)$
windowrule = opacity 0.0 0.0, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on, match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur on, match:class ^(xwaylandvideobridge)$
windowrule = opaque on, match:class ^$, match:title ^$
windowrule = no_shadow on, match:class ^$, match:title ^$
windowrule = no_blur on, match:class ^$, match:title ^$

bind = $mod, F1, exec, /home/moshpitcodes/.local/bin/show-keybinds # Help
bind = $mod, Return, exec, $terminal # Terminal
bind = ALT, Return, exec, [float; size 1431 805] $terminal
bind = $mod SHIFT, Return, exec, [fullscreen] $terminal
bind = $mod, D, exec, $menu # App launcher
bind = $mod, Q, killactive,
bind = $mod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bind = $mod, E, exec, nautilus --new-window # File manager
bind = ALT, E, exec, hyprctl dispatch exec '[float; size 1111 700] nautilus --new-window'
bind = $mod SHIFT, E, exec, hyprctl dispatch exec '[float; size 1111 700] ghostty -e yazi'
bind = $mod, Space, exec, /home/moshpitcodes/.local/bin/toggle_float
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod, K, swapsplit,
bind = $mod, G, togglegroup,
bind = $mod, F, fullscreen,
bind = $mod, M, fullscreen, 1
bind = $mod SHIFT, Escape, exec, /home/moshpitcodes/.local/bin/power-menu
bind = $mod CTRL, L, exec, loginctl lock-session
bind = $mod CTRL, R, exec, /usr/bin/hyprctl reload
bind = $mod SHIFT, B, exec, systemctl --user restart waybar.service # Restart waybar
bind = $mod, W, exec, /home/moshpitcodes/.local/bin/wallpaper-picker
bind = $mod SHIFT, W, exec, hyprctl dispatch exec '[float; size 925 615] waypaper'
bind = $mod SHIFT, S, exec, hyprctl dispatch exec '[workspace 5 silent] SoundWireServer'
bind = $mod SHIFT, O, exec, obs
bind = $mod SHIFT, N, exec, obsidian
bind = $mod, T, exec, /home/moshpitcodes/.local/bin/toggle_opacity
bind = $mod, C, exec, hyprpicker -a
bind = $mod, N, exec, swaync-client -t -sw
bind = CTRL SHIFT, Escape, exec, hyprctl dispatch exec '[workspace 9] missioncenter'
bind = $mod, equal, exec, woomer
