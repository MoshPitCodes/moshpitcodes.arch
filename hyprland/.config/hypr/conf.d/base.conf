exec-once = $HOME/.local/bin/start-keyring
exec-once = systemctl --user start swayosd.service
exec-once = systemctl --user start waybar.service
exec-once = bash -lc 'sleep 5; pkill -x nm-applet || true; pkill -x blueman-applet || true'
exec-once = swaync
exec-once = easyeffects --gapplication-service
exec-once = poweralertd
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = bash -lc 'swww-daemon & until swww query >/dev/null 2>&1; do sleep 0.1; done; waypaper --restore || swww img ~/Pictures/wallpapers/default.jpg --transition-type none'
