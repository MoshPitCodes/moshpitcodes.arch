monitor = eDP-1,2880x1800@120,auto,1.5
monitor = DP-5,1920x1080@60,0x0,1,transform,3
monitor = DP-6,2560x1440@60,1080x0,1
monitor = DP-7,2560x1440@60,3640x0,1
monitor = ,disable

workspace = 1, monitor:DP-5, default:true
workspace = 2, monitor:DP-5
workspace = 3, monitor:DP-5
workspace = 4, monitor:DP-6, default:true
workspace = 5, monitor:DP-6
workspace = 6, monitor:DP-6
workspace = 7, monitor:DP-7, default:true
workspace = 8, monitor:DP-7
workspace = 9, monitor:DP-7
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1

bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bindl = ,switch:on:Lid Switch, exec, hyprctl keyword monitor 'eDP-1, disable' && brightnessctl --device='asus::kbd_backlight' set 0
bindl = ,switch:off:Lid Switch, exec, hyprctl keyword monitor 'eDP-1, 2880x1800@120, 0x0, 1.5' && brightnessctl --device='asus::kbd_backlight' set 100%
