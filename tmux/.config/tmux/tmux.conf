set -g default-terminal "tmux-256color"
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -g prefix C-a
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[default] "
set -g status-right "#[fg=#c0caf5] %Y-%m-%d #[fg=#7aa2f7]| #[fg=#c0caf5]%H:%M "
set -g window-status-format "#[fg=#414868] #I:#W "
set -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold] #I:#W "
set -g window-status-separator ""
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#c0caf5"
set -g mode-keys vi

unbind C-b
unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
